<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body {
        font-family: Arial;
      }

      .title {
        font-size: 25px;
      }
       .login-input {
        padding: 10px 15px;
        margin-bottom: 10px;
        border-radius: 5px;
        border-width: 1px;
        width: 200px;
        margin-right:10px;
      }

      .login-button {
        background-color: rgb(0, 123, 255);
        color: white;
        margin-right: 5px;
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function Time() {
        const [time,setTime] = React.useState(dayjs().format('HH:mm:ss'))
        React.useEffect(() => {
          setInterval(() => {
            setTime(dayjs().format('HH:mm:ss'));
          console.log('run code');
        }, 1000);

      }, []);

        return (
         <div> <p>Current time: {time}</p></div>
        )
      }

      function LoginForm({showPassword,setShowPassword}){
        function switchShowPassword(){
          setShowPassword(!showPassword);
        }
        return (
          <>
        <div><div>
           <input 
           placeholder="Email"
           className="login-input" />
          </div><div><input 
          placeholder="Password"
          type={showPassword ? "text" : "password"}
          className="login-input" />
          <button 
          onClick={switchShowPassword}>Show</button>
        </div></div>
          <button
          className="login-button">Login</button>
          <button
          className="login-button">Sign up</button>
          </>
        )
      }

      function App() {
        const [showPassword, setShowPassword] = React.useState(false)
        

        return(
          <>
          <p className="title">Hello, welcome to my website</p>
          <LoginForm 
          showPassword={showPassword}
          setShowPassword={setShowPassword} />
          <Time />
          </>
        )
      }

      const container = document.querySelector('.js-container');
      const root= ReactDOM.createRoot(container)   
      root.render(<App />)
    </script>
  </body>
</html>
