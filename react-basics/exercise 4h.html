      function App() {
        const [count,setCount] = React.useState(0);
        const clickButtonRef = React.useRef(null);

         function increaseCount() {
           setCount(count + 1);
          }

        function resetCount() {
          setCount (0);
        }

        function autoClick() {
          setInterval(() => {
            const buttonElem = clickButtonRef.current;
            if (buttonElem) {
              buttonElem.click();
            }
          }, 1000);
        }

        return (
        <div className='buttons-container'>

          <button
        onClick={increaseCount}
        ref={clickButtonRef}>Clicked {count}  
        {count===1 
          ? ' time'
           : ' times'}</button>
          <button
          onClick={resetCount}>Reset</button>
          <button
          onClick = {autoClick}>Auto Click</button>
          </div>
       
        )
      }

      const container = document.querySelector('.js-container');
      const root= ReactDOM.createRoot(container)   
      root.render(<App />)
    </script>
